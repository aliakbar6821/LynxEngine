name: Build Lynx Engine APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission to gradlew
        run: chmod +x src/gradlew

      - name: Generate wrapper if missing
        run: |
          cd src
          if [ ! -f "gradlew" ]; then
            gradle wrapper --gradle-version=8.9
          fi

      - name: Build Debug APK
        run: |
          cd src
          ./gradlew assembleDebug --stacktrace

      - name: Build Release APK
        run: |
          cd src
          ./gradlew assembleRelease --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: LynxEngine-debug
          path: src/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: LynxEngine-release
          path: src/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Create Release on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src/app/build/outputs/apk/debug/*.apk
            src/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
